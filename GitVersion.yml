mode: ContinuousDelivery
next-version: 1.0.0
branches:
  main:
    regex: ^master$|^main$
    mode: ContinuousDelivery
    tag: ''
    increment: Patch
  develop:
    regex: ^dev(elop)?$
    mode: ContinuousDeployment
    tag: beta
    increment: Minor
  release:
    regex: ^release[/-]
    mode: ContinuousDelivery
    tag: rc
    increment: None
  feature:
    regex: ^feat(ure)?s?[/-]
    mode: ContinuousDelivery
    tag: useBranchName
    increment: Minor
ignore:
  sha: []