mode: ContinuousDelivery
next-version: 1.0.0
branches:
  main:
    regex: ^master$|^main$
    mode: ContinuousDelivery
    tag: ''
    increment: Patch
    prevent-tag-on-merge: false
  develop:
    regex: ^dev(elop)?$
    mode: ContinuousDeployment
    tag: beta
    increment: Minor
  feature:
    regex: ^feat(ures)?[/-]
    mode: ContinuousDelivery
    tag: useBranchName
    increment: Inherit
ignore:
  sha: []