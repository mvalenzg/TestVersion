mode: ContinuousDelivery
next-version: 1.0.0
branches:
  main:
    regex: ^master$|^main$
    mode: ContinuousDelivery
    tag: ''
    increment: Patch
    prevent-tag-on-merge: false
  develop:
    regex: ^dev(elop)?$
    mode: ContinuousDeployment
    tag: beta
    increment: Minor
  feature:
    regex: ^feat(ures)?[/-]
    mode: ContinuousDelivery
    tag: useBranchName
    increment: Inherit
  release:
    regex: ^release[/-]
    mode: ContinuousDelivery
    tag: rc # Esto generará 1.1.0-rc.1, 1.1.0-rc.2, etc.
    increment: None # La versión la dicta el nombre de la rama (ej: release/1.1.0)
    prevent-tag-on-merge: false
ignore:
  sha: []